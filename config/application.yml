server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/skeletondb
  max_connections: 10
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
logging:
  level: info
  format: json
  file: logs/payroll.log
module:
  name: payroll
  enabled: true
features:
  soft_delete: true
  state_machines: false
  workflows: false
entities:
  payroll_entry:
    collection: payroll_entries
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  salary_slip:
    collection: salary_slips
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  salary_slip_line:
    collection: salary_slip_lines
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  salary_structure:
    collection: salary_structures
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  salary_component:
    collection: salary_components
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
