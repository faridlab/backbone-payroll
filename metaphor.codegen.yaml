# Codegen policy for payroll.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs, lib.rs)
# and are preserved by the marker mechanism, not listed here.
#
# Add your hand-authored services, handlers, tests, and docs below as you write them.

user_owned:
  - "src/application/service/payroll_events.rs"
  - "src/application/service/payroll_gl.rs"
  - "src/application/service/payroll_write_service.rs"
  # Own the hand-written payroll SQL (the structure/run/slip writes, the run roll-up, the deduction
  # grouping the salary journal is built from, and the at-most-once GL post gate) that the write service
  # orchestrates. Declared here — not renamed with a `_custom` suffix — so the generator skips them
  # wholesale; this declaration is what makes editing them legitimate.
  - "src/infrastructure/persistence/payroll_entry_repository.rs"
  - "src/infrastructure/persistence/salary_component_repository.rs"
  - "src/infrastructure/persistence/salary_slip_line_repository.rs"
  - "src/infrastructure/persistence/salary_slip_repository.rs"
  - "src/infrastructure/persistence/salary_structure_repository.rs"
  - "tests/integrity_probes.rs"
  - "tests/payroll_gl_seam.rs"
  - "tests/payroll_golden_cases.rs"
  - "tests/payroll_hr_seam.rs"
  - "scripts/**"
  # Hand-authored behavior (services + their HTTP surface). Examples:
  # - "src/application/service/onboarding_service.rs"
  # - "src/presentation/http/guarded_routes.rs"

  # Behavior tests (the golden cases / oracle) + BDD features.
  - "tests/features/**"
  # - "tests/*_golden_cases.rs"
  # - "tests/integrity_probes.rs"

  # Hand-authored module documentation.
  - "docs/**"
