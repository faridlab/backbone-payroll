          type: integer
          format: int32
        period_month:
          type: integer
          format: int32
        posting_date:
          nullable: true
          type: string
          format: date-time
        status:
          type: string
        salary_expense_account_id:
          nullable: true
          type: string
          format: uuid
        salary_payable_account_id:
          nullable: true
          type: string
          format: uuid
        total_gross:
          type: string
        total_deductions:
          type: string
        total_net:
          type: string
        journal_id:
          nullable: true
          type: string
          format: uuid
        accounting_post_id:
          nullable: true
          type: string
          format: uuid
        metadata:
          type: object

    PatchPayrollEntryRequest:
      type: object
      properties:
        company_id:
          type: string
          format: uuid
        period_year:
          type: integer
          format: int32
