components:
  schemas:
    PayrollEntry:
      type: object
      required:
        - id
        - company_id
        - period_year
        - period_month
        - status
        - total_gross
        - total_deductions
        - total_net
        - metadata
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        period_year:
          type: integer
          format: int32
        period_month:
          type: integer
          format: int32
        posting_date:
          nullable: true
          type: string
          format: date-time
        status:
          type: string
        salary_expense_account_id:
          nullable: true
          type: string
          format: uuid
        salary_payable_account_id:
          nullable: true
          type: string
          format: uuid
        total_gross:
          type: string
        total_deductions:
          type: string
        total_net:
          type: string
        journal_id:
          nullable: true
          type: string
          format: uuid
        accounting_post_id:
          nullable: true
          type: string
          format: uuid
        metadata:
          type: object

    PayrollEntryBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PayrollEntry'
        total: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    CreatePayrollEntryRequest:
      type: object
      required:
        - company_id
        - period_year
        - period_month
        - status
        - total_gross
        - total_deductions
        - total_net
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        period_year:
          type: integer
          format: int32
        period_month:
          type: integer
          format: int32
        posting_date:
          nullable: true
          type: string
          format: date-time
        status:
          type: string
        salary_expense_account_id:
          nullable: true
          type: string
          format: uuid
        salary_payable_account_id:
          nullable: true
          type: string
          format: uuid
        total_gross:
          type: string
        total_deductions:
          type: string
        total_net:
          type: string
        journal_id:
          nullable: true
          type: string
          format: uuid
        accounting_post_id:
          nullable: true
          type: string
          format: uuid
        metadata:
          type: object

    UpdatePayrollEntryRequest:
      type: object
      required:
        - company_id
        - period_year
        - period_month
        - status
        - total_gross
        - total_deductions
        - total_net
        - metadata
